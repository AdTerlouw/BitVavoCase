<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz - CryptoFlow</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .quiz-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .quiz-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #e8f0fe 0%, #d2e3fc 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }

        .quiz-icon svg {
            color: #1E5BFF;
        }

        .quiz-content h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .quiz-content p {
            font-size: 15px;
            color: #5f6368;
            line-height: 1.6;
            max-width: 280px;
            margin-bottom: 32px;
        }

        .bitvavo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: #f5f7fa;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .bitvavo-badge .logo {
            width: 24px;
            height: 24px;
            background: #1E5BFF;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
        }

        .bitvavo-badge span {
            font-size: 14px;
            color: #5f6368;
        }

        .continue-btn {
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 600;
            color: #1E5BFF;
            background: #e8f0fe;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .continue-btn:hover {
            background: #d2e3fc;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <span class="signal">●●●●</span>
                <span class="wifi">⚫</span>
                <span class="battery">🔋</span>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="nav-bar">
            <a href="scenario-2-explain.html" class="nav-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="nav-actions"></div>
        </nav>

        <!-- Quiz Content -->
        <div class="quiz-content">
            <div class="quiz-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </div>
            
            <h1>Knowledge Check</h1>
            <p>Test your understanding of limit orders with a quick quiz.</p>

            <div class="bitvavo-badge">
                <div class="logo">B</div>
                <span>The quiz Bitvavo has today</span>
            </div>

            <a href="scenario-2-order.html" class="continue-btn">Continue</a>
        </div>
    </div>
</body>
</html>
